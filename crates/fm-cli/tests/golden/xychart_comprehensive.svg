<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 556 560" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" role="img" data-nodes="12" data-edges="3" data-type="xyChart" data-detail-tier="rich"><title>xyChart diagram</title><desc>A diagram with 12 nodes and 3 edges. flowing top to bottom. Key nodes: Sales Q1: 30, Sales Q2: 60, Sales Q3: 95.. Key relationships: Target Q1: 50 connects to Target Q2: 70; Target Q2: 70 connects to Target Q3: 100; Target Q3: 100 connects to Target Q4: 80.. Layout spans 476 by 480 units with 12 rendered node boxes and 3 routed edge paths.</desc><style>:root{--fm-bg: #fafbfc;--fm-text-color: #1a1a2e;--fm-node-fill: #ffffff;--fm-node-stroke: #e2e8f0;--fm-edge-color: #94a3b8;--fm-cluster-fill: rgba(241,245,249,0.6);--fm-cluster-stroke: #cbd5e1;--fm-accent-1: #6366f1;}@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');.fm-text{font-family: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size: 15px;font-weight: 500;}:root{--fm-edge-muted: var(--fm-cluster-stroke);--fm-edge-label-bg: var(--fm-bg);--fm-edge-label-border: var(--fm-cluster-stroke);--fm-edge-label-text: var(--fm-text-color);--fm-surface-shadow: rgba(15,23,42,0.1);}svg{shape-rendering: geometricPrecision;background: var(--fm-bg);background-image:radial-gradient(ellipse at 20% 0%,color-mix(in srgb,var(--fm-accent-1) 4%,transparent) 0%,transparent 50%),linear-gradient(180deg,var(--fm-bg) 0%,color-mix(in srgb,var(--fm-bg) 96%,var(--fm-node-stroke) 4%) 100%);}.fm-node{isolation: isolate;--fm-node-accent: var(--fm-node-stroke);--fm-node-hover-accent: var(--fm-edge-color);}.fm-node rect,.fm-node path,.fm-node circle,.fm-node ellipse,.fm-node polygon{fill: var(--fm-node-fill);stroke: var(--fm-node-accent);stroke-width: 1.6;vector-effect: non-scaling-stroke;shape-rendering: geometricPrecision;filter: drop-shadow(0 2px 8px rgba(0,0,0,0.10)) drop-shadow(0 1px 3px rgba(0,0,0,0.06));transition: fill 200ms ease,stroke 200ms ease,filter 200ms ease,transform 200ms cubic-bezier(0.4,0,0.2,1);}.fm-node line{stroke: var(--fm-node-accent);stroke-width: 1.5;vector-effect: non-scaling-stroke;}.fm-node text{fill: var(--fm-text-color);font-weight: 600;letter-spacing: -0.02em;text-rendering: optimizeLegibility;font-feature-settings: "kern" 1,"liga" 1,"calt" 1;}.fm-node:hover rect,.fm-node:hover path,.fm-node:hover circle,.fm-node:hover ellipse,.fm-node:hover polygon{stroke: var(--fm-node-hover-accent);filter: drop-shadow(0 8px 20px rgba(0,0,0,0.14)) drop-shadow(0 3px 8px rgba(0,0,0,0.08));transform: translateY(-2px) scale(1.01);transform-origin: center;}.fm-edge{fill: none;stroke: var(--fm-edge-color);stroke-linecap: round;stroke-linejoin: round;vector-effect: non-scaling-stroke;paint-order: stroke;transition: stroke 200ms ease,opacity 200ms ease,stroke-width 200ms ease;cursor: default;}.fm-edge:hover{stroke: var(--fm-accent-1);stroke-width: 2.5;opacity: 1;}.fm-edge-solid{stroke-dasharray: none;}.fm-edge-back{stroke: var(--fm-edge-muted);opacity: 0.8;stroke-dasharray: 4 4;}marker#arrow-end path,marker#arrow-filled path,marker#arrow-circle path,marker#arrow-diamond path{fill: var(--fm-edge-color);stroke: none;transition: fill 200ms ease;}.fm-edge:hover ~ marker#arrow-end path,.fm-edge:hover ~ marker#arrow-filled path,.fm-edge:hover ~ marker#arrow-circle path,.fm-edge:hover ~ marker#arrow-diamond path{fill: var(--fm-accent-1);}marker#arrow-open path{stroke: var(--fm-edge-muted);fill: none;stroke-width: 1.8;transition: stroke 200ms ease;}marker#arrow-cross path{stroke: var(--fm-edge-color);fill: none;stroke-width: 1.8;transition: stroke 200ms ease;}.fm-label{fill: var(--fm-text-color);}@media (prefers-reduced-motion: reduce){.fm-node rect,.fm-node path,.fm-node circle,.fm-node ellipse,.fm-node polygon,.fm-edge{transition: none;transform: none;}}.fm-node:focus-visible{outline: 2px solid var(--fm-accent-1);outline-offset: 3px;}/* High contrast mode support */ @media (prefers-contrast: more){:root{--fm-bg: #ffffff !important;--fm-text-color: #000000 !important;--fm-node-fill: #ffffff !important;--fm-node-stroke: #000000 !important;--fm-edge-color: #000000 !important;}.fm-node{stroke-width: 2px !important;}.fm-edge{stroke-width: 2px !important;}}/* Reduced motion support */ @media (prefers-reduced-motion: reduce){.fm-edge,.fm-node{animation: none !important;transition: none !important;}}/* Focus indicators for keyboard navigation */ .fm-node:focus,.fm-edge:focus{outline: 3px solid #0066cc;outline-offset: 2px;}.fm-node:focus-visible,.fm-edge:focus-visible{outline: 3px solid #0066cc;outline-offset: 2px;}/* Screen reader only content */ .fm-sr-only{position: absolute;width: 1px;height: 1px;padding: 0;margin: -1px;overflow: hidden;clip: rect(0,0,0,0);white-space: nowrap;border: 0;}@media print{.fm-node text,.fm-edge-labeled text,.fm-cluster-label{font-size: 8.0px !important;fill: #111 !important;}.fm-node path,.fm-node rect,.fm-node circle,.fm-edge{stroke: #111 !important;}.fm-cluster{fill: #fff !important;stroke: #666 !important;}}</style><defs></defs><rect x="128" y="124" width="352" height="320" fill="rgba(148,163,184,0.06)" stroke="rgba(148,163,184,0.16)" stroke-width="1" rx="10" class="fm-xychart-plot"/><line x1="128" y1="444" x2="480" y2="444" stroke="rgba(148,163,184,0.35)" stroke-width="1" stroke-dasharray="4,4" class="fm-xychart-gridline"/><text x="118" y="448" text-anchor="end" font-size="10.80" fill="#94a3b8" class="fm-xychart-y-tick">0</text><line x1="128" y1="364" x2="480" y2="364" stroke="rgba(148,163,184,0.35)" stroke-width="1" stroke-dasharray="4,4" class="fm-xychart-gridline"/><text x="118" y="368" text-anchor="end" font-size="10.80" fill="#94a3b8" class="fm-xychart-y-tick">30</text><line x1="128" y1="284" x2="480" y2="284" stroke="rgba(148,163,184,0.35)" stroke-width="1" stroke-dasharray="4,4" c