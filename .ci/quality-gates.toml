[golden_checksum]
enabled = true
blocking = true
layout_paths = ["crates/fm-layout/**", "crates/fm-core/**"]
svg_bless_env = "BLESS"
layout_bless_env = "BLESS_LAYOUT"
allow_commit_tag = "[golden-update]"

[performance_regression]
enabled = true
blocking = true
paths = ["crates/fm-layout/**", "crates/fm-core/**", "crates/fm-parser/**"]
warn_threshold_pct = 5.0
fail_threshold_pct = 10.0
sample_count = 15
baseline_path = ".ci/perf-baseline.json"
slo_path = ".ci/slo.yaml"
allow_commit_tag_prefix = "[perf-regression-ok:"
benchmark_commands = [
  "cargo test -p fm-layout perf_baseline_ -- --nocapture",
  "cargo test -p fm-cli --test integration_test perf_slo_ -- --nocapture",
]

[property_test]
enabled = true
blocking = true
cases = 10000
command = "cargo test --workspace --all-targets"

[invariant_proof]
enabled = true
blocking = true
command = "cargo test -p fm-cli --test invariant_proof_harness -- --nocapture"

[evidence_ledger]
enabled = true
blocking = false
labels = ["alien-cs"]
evidence_dir = "evidence"
contracts_dir = "evidence/contracts"

[determinism]
enabled = true
blocking = true
runs = 10
layout_paths = ["crates/fm-layout/**"]
command = "cargo test -p fm-cli --test golden_layout_test layout_golden_cases_are_deterministic_across_runs -- --nocapture"

[decision_contract]
enabled = true
blocking = false
contracts_dir = "evidence/contracts"

[degradation]
enabled = true
blocking = true
command = "cargo test -p fm-cli --test invariant_proof_harness deg_ -- --nocapture"

[release_gate_overrides]
enabled = true
policy_id = "fm.release-gate.override@v1"
allowed_approvers = ["Dicklesworthstone"]
max_override_days = 14
require_retro_bead = true
require_fix_bead = true
overrides_path = ".ci/release-gate-overrides.toml"

[demo_evidence]
enabled = true
blocking = true
static_repeat = 5
react_repeat = 5
